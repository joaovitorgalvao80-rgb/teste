{% extends "base.html" %}
{% block title %}Entrar — B-rolls{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="card auth-card">
    <h1>Entrar</h1>
    {% if error %}<p class="alert">{{ error }}</p>{% endif %}
    <form method="post" action="/login">
      <label>Usuario<input name="username" required autofocus></label>
      <label>Senha<input name="password" type="password" required></label>
      <button class="primary" type="submit">Entrar</button>
    </form>
  </div>

  <div class="card auth-card">
    <h2>Criar conta</h2>
    <p class="muted">Primeira vez? Crie um usuario e cadastre suas APIs.</p>
    <form method="post" action="/register">
      <label>Usuario<input name="username" required></label>
      <label>Senha (min 4)<input name="password" type="password" required minlength="4"></label>
      <button class="secondary" type="submit">Criar e continuar</button>
    </form>
  </div>
</div>
{% endblock %}
