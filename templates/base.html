<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <title>{% block title %}NWRCH Studio{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css?v={{ static_version }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/projects" aria-label="NWRCH Studio">
      <span class="brand-mark">N</span>
      <span>
        <span class="brand-name">NWRCH Studio</span><br>
        <span class="brand-sub">Cutroom Console</span>
      </span>
    </a>
    <nav class="topnav">
      {% if user %}
        <a href="/projects">Projetos</a>
        <a href="/settings">Configurações</a>
        <a href="/logout">{{ user.username }} · sair</a>
      {% endif %}
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <script src="/static/gallery.js?v={{ static_version }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
