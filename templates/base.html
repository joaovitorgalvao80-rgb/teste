<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}NWRCH Studio{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/projects" aria-label="NWRCH Studio">
      <span class="brand-mark">N</span>
      <span class="brand-copy">
        <strong>NWRCH Studio</strong>
        <em>AI B-roll Production</em>
      </span>
    </a>
    <nav>
      {% if user %}
        <a href="/projects">Projetos</a>
        <a href="/settings">Configurações</a>
        <span class="who">{{ user.username }}</span>
        <a class="logout-link" href="/logout">Sair</a>
      {% endif %}
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <script src="/static/gallery.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
