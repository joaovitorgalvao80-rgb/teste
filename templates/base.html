<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}B-rolls — Curadoria{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/projects">▶ B-rolls <span>Curadoria</span></a>
    <nav>
      {% if user %}
        <a href="/projects">Projetos</a>
        <a href="/settings">Configurações</a>
        <span class="who">{{ user.username }}</span>
        <a href="/logout" style="color:var(--muted-2);font-size:13px;padding:6px 10px;">Sair</a>
      {% endif %}
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <script src="/static/gallery.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
