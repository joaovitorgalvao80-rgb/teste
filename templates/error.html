{% extends "base.html" %}
{% block title %}Erro {{ status_code }}{% endblock %}
{% block content %}
<div class="panel panel-pad" style="max-width:480px;margin:var(--sp-7) auto;text-align:center">
  <p class="tag" style="margin-bottom:var(--sp-3)">NWRCH Studio</p>
  <h1 style="font-size:var(--fs-h1);margin-bottom:var(--sp-3)">{{ status_code }}</h1>
  <p class="t-muted" style="margin-bottom:var(--sp-5)">{{ detail or "Algo deu errado." }}</p>
  <a class="btn btn-primary" href="/projects">Voltar para projetos</a>
</div>
{% endblock %}
